<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Libretto</title>

<meta name="theme-color" content="#004b8d">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Libretto">
<meta name="mobile-web-app-capable" content="yes">

<link rel="apple-touch-icon" href="icon.png">

<style>

:root{
--blue:#004b8d;
--blue-dark:#0e3c70;
--light-bg:#f3f4f6;
--card:#ffffff;
--text:#1f2937;
--muted:#6b7280;
--shadow:0 2px 8px rgba(0,0,0,0.08);
--radius:16px;
--maxw:760px;
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
background:var(--light-bg);
color:var(--text);
padding-bottom:92px;
}

.app{
max-width:var(--maxw);
margin:0 auto;
min-height:100vh;
background:var(--light-bg);
}

.topbar{
background:var(--blue);
color:white;
padding:14px 14px 16px;
position:sticky;
top:0;
z-index:30;
}

.topbar-title{
text-align:center;
font-size:17px;
font-weight:700;
}

.tabs{
display:flex;
background:#f5f5f5;
border-bottom:1px solid #d9dee5;
}

.tab-btn{
flex:1;
border:none;
background:transparent;
padding:14px;
font-weight:700;
color:#4b5563;
}

.tab-btn.active{
color:var(--blue-dark);
border-bottom:3px solid var(--blue);
}

.content{
padding:12px;
}

.card{
background:white;
border-radius:var(--radius);
box-shadow:var(--shadow);
padding:20px;
text-align:center;
color:var(--muted);
}

.bottom-nav{
position:fixed;
left:0;
right:0;
bottom:0;
background:white;
border-top:1px solid #d7dbe0;
display:flex;
justify-content:space-evenly;
padding:10px;
}

.nav-btn{
background:none;
border:none;
text-align:center;
font-size:12px;
color:#4b5563;
}

.nav-btn.active{
color:var(--blue);
font-weight:700;
}

.nav-icon{
font-size:22px;
display:block;
}

</style>

</head>
<body>

<div class="app">

<header class="topbar">
<div class="topbar-title">Libretto</div>
</header>

<div class="tabs">
<button class="tab-btn active">SUPERATI</button>
<button class="tab-btn">PIANIFICATI</button>
</div>

<div class="content">

<div class="card">
Nessun esame superato.
</div>

</div>

<nav class="bottom-nav">

<button class="nav-btn">
<span class="nav-icon">⌂</span>
Cruscotto
</button>

<button class="nav-btn active">
<span class="nav-icon">🎓</span>
Libretto
</button>

</nav>

</div>

</body>
</html>
